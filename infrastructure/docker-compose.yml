version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: omega_postgres
    restart: always

    environment:
      POSTGRES_USER: omega
      POSTGRES_PASSWORD: omega
      POSTGRES_DB: omega_bank

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: omega_redis
    restart: always

    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:latest
    container_name: omega_kafka
    restart: always

    ports:
      - "9092:9092"

volumes:
  postgres_data:
